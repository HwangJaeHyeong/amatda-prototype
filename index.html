<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>아맞다! — 프로토타입</title>
<meta name="theme-color" content="#7c5cff" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="아맞다!" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f3f1f8; --card:#ffffff; --ink:#16131f; --sub:#8b8794;
    --line:#ece9f2; --brand:#7c5cff; --brand-soft:#efeaff;
    --pink:#ff6fae; --green:#36c98e; --amber:#ffb23e; --blue:#5aa9ff;
    --shadow:0 10px 30px rgba(40,30,80,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Noto Sans KR',-apple-system,system-ui,sans-serif;
    background:linear-gradient(160deg,#e9e4f7,#f6f1ee);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;color:var(--ink);
  }
  .phone{
    position:relative;width:390px;height:844px;background:#000;border-radius:54px;
    padding:12px;box-shadow:0 40px 80px rgba(40,20,90,.35);
  }
  .screen{
    position:relative;width:100%;height:100%;background:var(--bg);
    border-radius:44px;overflow:hidden;display:flex;flex-direction:column;
  }
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:130px;height:30px;background:#000;border-radius:0 0 18px 18px;z-index:50;}
  .statusbar{height:48px;display:flex;align-items:flex-end;justify-content:space-between;
    padding:0 26px 6px;font-size:13px;font-weight:700;z-index:40;}
  .statusbar .right{display:flex;gap:5px;align-items:center;}

  .body{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:6px 20px 24px;}
  .body::-webkit-scrollbar{display:none;}
  .body.onb{padding-bottom:96px;}

  /* 탭바는 흐름상 화면 맨 아래 요소 → 모든 탭에서 항상 바닥 고정 */
  .tabbar{flex-shrink:0;height:84px;
    background:rgba(255,255,255,.86);backdrop-filter:blur(18px);
    border-top:1px solid var(--line);display:flex;padding:8px 10px 24px;z-index:45;}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    font-size:10px;color:var(--sub);font-weight:500;cursor:pointer;}
  .tab svg{width:24px;height:24px;}
  .tab.active{color:var(--brand);}
  .tab.active svg{stroke:var(--brand);}

  h1{font-size:28px;font-weight:900;margin:8px 0 2px;letter-spacing:-.5px;}
  .sub{color:var(--sub);font-size:13px;margin:0 0 16px;line-height:1.5;}
  .card{background:var(--card);border-radius:22px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px;}

  .persona-card{background:linear-gradient(135deg,#7c5cff,#9b7bff);color:#fff;border:none;
    display:flex;gap:14px;align-items:center;}
  .persona-card .avatar{font-size:34px;width:56px;height:56px;border-radius:18px;
    background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .persona-card .who{font-size:12px;opacity:.85;font-weight:700;}
  .persona-card .msg{font-size:15px;font-weight:700;line-height:1.45;margin-top:3px;}

  .weatherrow{display:flex;gap:10px;margin-bottom:16px;}
  .wchip{flex:1;background:var(--card);border-radius:18px;padding:14px;text-align:center;box-shadow:var(--shadow);}
  .wchip .big{font-size:20px;font-weight:900;}
  .wchip .lbl{font-size:11px;color:var(--sub);margin-top:2px;}

  .sectitle{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 10px;}
  .sectitle b{font-size:16px;}
  .sectitle .count{font-size:12px;color:var(--brand);font-weight:700;background:var(--brand-soft);
    padding:3px 10px;border-radius:20px;}

  .group-tag{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;
    color:#6a6577;background:#efedf4;padding:5px 12px;border-radius:20px;margin:10px 0 8px;}

  .item{display:flex;align-items:center;gap:13px;padding:13px 4px;border-bottom:1px solid var(--line);}
  .item:last-child{border-bottom:none;}
  .check{width:24px;height:24px;border-radius:9px;border:2px solid #d8d4e2;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;}
  .check.on{background:var(--brand);border-color:var(--brand);}
  .check.on svg{stroke:#fff;}
  .check svg{width:14px;height:14px;opacity:0;}
  .check.on svg{opacity:1;}
  .item .label{flex:1;font-size:15px;font-weight:500;}
  .item.done .label{text-decoration:line-through;color:var(--sub);}
  .item .why{font-size:11px;color:var(--brand);font-weight:600;background:var(--brand-soft);
    padding:2px 9px;border-radius:14px;white-space:nowrap;}
  .item .why.env{color:var(--blue);background:#e8f2ff;}
  .item .why.warn{color:#e2622b;background:#ffe9df;}

  /* 밀어서 챙김 (스와이프) */
  .swipe-wrap{position:relative;overflow:hidden;border-radius:13px;margin:3px 0;}
  .swipe-bg{position:absolute;inset:0;display:flex;align-items:center;padding:0 20px;
    font-weight:800;font-size:14px;border-radius:13px;}
  .swipe-wrap:not(.isdone) .swipe-bg{background:#e6f9f1;color:var(--green);justify-content:flex-start;}
  .swipe-wrap.isdone .swipe-bg{background:#fff1e0;color:#d98a17;justify-content:flex-end;}
  .swipe-wrap:not(.isdone) .bgr,.swipe-wrap.isdone .bgl{display:none;}
  .swipe-wrap.armed .swipe-bg{filter:brightness(.96);}
  .swipe-card{position:relative;background:var(--card);display:flex;align-items:center;gap:12px;
    padding:14px 8px;touch-action:pan-y;cursor:grab;user-select:none;-webkit-user-select:none;}
  .swipe-card:active{cursor:grabbing;}
  .swipe-card .dot{width:22px;height:22px;border-radius:50%;border:2px solid #d8d4e2;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:900;}
  .swipe-card.done .dot{background:var(--green);border-color:var(--green);animation:pop .32s cubic-bezier(.2,1.4,.4,1);}
  @keyframes pop{0%{transform:scale(0) rotate(-30deg)}60%{transform:scale(1.35)}100%{transform:scale(1)}}
  .swipe-card .label{flex:1;font-size:15px;font-weight:500;}
  .swipe-card.done .label{text-decoration:line-through;color:var(--sub);}
  .swipe-card .hint{color:#d2cce0;font-size:11px;font-weight:700;white-space:nowrap;}

  .btn{display:block;width:100%;border:none;border-radius:18px;padding:16px;font-size:15px;
    font-weight:700;cursor:pointer;font-family:inherit;}
  .btn.primary{background:var(--brand);color:#fff;}
  .btn.ghost{background:var(--brand-soft);color:var(--brand);}
  .btn:disabled{opacity:.4;}
  .btn:active{transform:scale(.98);}

  textarea,input{width:100%;border:1.5px solid var(--line);border-radius:16px;padding:14px;
    font-family:inherit;font-size:15px;resize:none;background:var(--card);color:var(--ink);}
  textarea:focus,input:focus{outline:none;border-color:var(--brand);}
  label.fld{font-size:13px;font-weight:700;color:var(--sub);display:block;margin:4px 2px 7px;}

  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 4px;}
  .chip{font-size:12px;background:#fff;border:1.5px solid var(--line);border-radius:20px;
    padding:8px 13px;cursor:pointer;font-weight:600;}
  .chip:active{background:var(--brand-soft);}
  .chip.sel{background:var(--brand);color:#fff;border-color:var(--brand);}

  .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .pcard{background:var(--card);border-radius:20px;padding:18px 14px;text-align:center;
    box-shadow:var(--shadow);cursor:pointer;border:2.5px solid transparent;transition:.15s;}
  .pcard.sel{border-color:var(--brand);background:var(--brand-soft);}
  .pcard .face{font-size:40px;}
  .pcard .pname{font-weight:900;font-size:15px;margin-top:8px;}
  .pcard .pdesc{font-size:11px;color:var(--sub);margin-top:4px;line-height:1.4;}

  /* 취향분석 키워드 카드 */
  .kgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .kcard{background:var(--card);border-radius:18px;padding:16px 12px;text-align:center;
    box-shadow:var(--shadow);cursor:pointer;border:2.5px solid transparent;transition:.12s;position:relative;}
  .kcard.sel{border-color:var(--brand);background:var(--brand-soft);transform:scale(1.02);}
  .kcard .kf{font-size:30px;}
  .kcard .kn{font-weight:700;font-size:13px;margin-top:6px;}
  .kcard.sel::after{content:"✓";position:absolute;top:8px;right:11px;color:var(--brand);font-weight:900;}

  /* 덜렁거림 레벨 */
  .levels{display:flex;flex-direction:column;gap:11px;}
  .lvl{display:flex;align-items:center;gap:14px;background:var(--card);border-radius:18px;padding:16px;
    box-shadow:var(--shadow);cursor:pointer;border:2.5px solid transparent;}
  .lvl.sel{border-color:var(--brand);background:var(--brand-soft);}
  .lvl .lf{font-size:30px;}
  .lvl .lt{font-weight:800;font-size:15px;}
  .lvl .ld{font-size:12px;color:var(--sub);margin-top:2px;}

  .noti{display:flex;gap:12px;padding:14px;background:var(--card);border-radius:18px;
    box-shadow:var(--shadow);margin-bottom:11px;}
  .noti .ava{font-size:26px;width:44px;height:44px;border-radius:14px;background:var(--brand-soft);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .noti .nbody{flex:1;}
  .noti .nhead{display:flex;justify-content:space-between;align-items:center;}
  .noti .nname{font-weight:800;font-size:13px;}
  .noti .ntime{font-size:11px;color:var(--sub);}
  .noti .ntext{font-size:14px;margin-top:4px;line-height:1.45;}

  .routine{padding:14px 4px;border-bottom:1px solid var(--line);}
  .routine:last-child{border-bottom:none;}
  .routine .rtop{display:flex;align-items:center;gap:8px;}
  .routine .rname{font-weight:700;font-size:15px;}
  .routine .rmeta{font-size:12px;color:var(--sub);margin-top:4px;}
  .routine .ritems{font-size:12px;color:var(--brand);margin-top:6px;font-weight:600;}
  .badge{font-size:10px;font-weight:800;padding:3px 9px;border-radius:12px;background:#e6f9f1;color:var(--green);}
  .badge.learn{background:#fff1e0;color:#d98a17;}

  .learnbox{background:linear-gradient(135deg,#fff4e3,#ffe9cf);border:1.5px solid #ffdca6;
    border-radius:20px;padding:16px;margin-bottom:16px;}
  .learnbox .lh{font-size:13px;font-weight:800;color:#c9780f;margin-bottom:6px;}
  .learnbox .lb{font-size:13px;color:#7a6038;line-height:1.5;margin-bottom:12px;}
  .learnbox .lbtns{display:flex;gap:8px;}
  .learnbox button{flex:1;border:none;border-radius:13px;padding:11px;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;}
  .learnbox .yes{background:var(--amber);color:#fff;}
  .learnbox .no{background:#fff;color:#a98a5e;}

  /* 챗봇 일정 추가 */
  .chat{display:flex;flex-direction:column;gap:9px;padding-top:6px;}
  .row{display:flex;gap:8px;align-items:flex-end;}
  .row.me{justify-content:flex-end;}
  .botava{font-size:20px;width:34px;height:34px;border-radius:11px;background:var(--brand-soft);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .bub{max-width:78%;padding:12px 15px;border-radius:18px;font-size:14px;line-height:1.5;}
  .bub.bot{background:#fff;box-shadow:var(--shadow);border-bottom-left-radius:5px;}
  .bub.me{background:var(--brand);color:#fff;border-bottom-right-radius:5px;}
  .qreplies{display:flex;flex-wrap:wrap;gap:8px;margin:2px 0 4px 42px;}
  .qr{font-size:13px;background:#fff;border:1.5px solid var(--brand);color:var(--brand);
    border-radius:20px;padding:9px 14px;font-weight:700;cursor:pointer;transition:.12s;}
  .qr:active{transform:scale(.96);}
  .qr.added{background:var(--brand);color:#fff;}
  .qr.skip{border-color:var(--line);color:var(--sub);}
  .qr.go{background:var(--brand);color:#fff;}
  .chatinput{display:flex;gap:8px;margin:8px 0 4px 42px;}
  .chatinput input{flex:1;border-radius:22px;padding:12px 16px;}
  .chatinput button{border:none;background:var(--brand);color:#fff;border-radius:50%;
    width:46px;height:46px;flex-shrink:0;font-size:18px;cursor:pointer;}
  .reconote{font-size:11px;color:var(--sub);margin:0 0 2px 42px;}

  .empty{text-align:center;color:var(--sub);padding:40px 20px;font-size:14px;}
  .fade{animation:fade .35s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  .toast{position:absolute;bottom:104px;left:50%;transform:translateX(-50%);
    background:#16131f;color:#fff;padding:12px 20px;border-radius:30px;font-size:13px;font-weight:600;
    z-index:60;opacity:0;transition:.25s;pointer-events:none;max-width:80%;text-align:center;}
  .toast.show{opacity:1;bottom:114px;}

  /* 온보딩 진행바 + 하단 고정 버튼 */
  .prog{display:flex;gap:6px;margin:14px 0 18px;}
  .prog span{flex:1;height:5px;border-radius:3px;background:#e1dcec;}
  .prog span.on{background:var(--brand);}
  .obfoot{position:absolute;bottom:0;left:0;right:0;padding:16px 20px 26px;
    background:linear-gradient(180deg,transparent,var(--bg) 30%);z-index:30;}

  /* 📱 모바일/터치: 폰 프레임 제거하고 화면 꽉 채워 네이티브 앱처럼 */
  @media (max-width:600px), (pointer:coarse){
    html,body{height:100dvh;overflow:hidden;}            /* 페이지 자체 스크롤 차단 */
    body{padding:0;display:block;background:var(--bg);}
    .phone{position:fixed;inset:0;width:100vw;height:100vh;height:100dvh;
      padding:0;border-radius:0;box-shadow:none;background:var(--bg);}
    .screen{width:100%;height:100%;border-radius:0;}
    .notch,.statusbar{display:none;}
    .body{padding-top:max(14px,env(safe-area-inset-top));}
    /* 탭바는 흐름상 바닥 요소 — 세이프에어리어만 보강 */
    .tabbar{height:auto;padding:8px 10px max(18px,env(safe-area-inset-bottom));}
    .obfoot{padding-bottom:max(26px,calc(env(safe-area-inset-bottom) + 12px));}
  }
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="screen">
    <div class="statusbar">
      <span id="clock">9:41</span>
      <span class="right">
        <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="4.5" width="3" height="7.5" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
        <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><path d="M9 2.5c2.3 0 4.4.9 6 2.3l1.3-1.4C14.4 1.5 11.8.5 9 .5S3.6 1.5 1.7 3.4L3 4.8C4.6 3.4 6.7 2.5 9 2.5z" opacity=".9"/><path d="M9 6c1.2 0 2.3.5 3.1 1.3l1.3-1.4C12.3 4.7 10.7 4 9 4s-3.3.7-4.4 1.9l1.3 1.4C6.7 6.5 7.8 6 9 6z"/><circle cx="9" cy="9.8" r="1.6"/></svg>
        <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x=".7" y=".7" width="22" height="11.6" rx="3.2" stroke="currentColor" opacity=".4"/><rect x="2.2" y="2.2" width="17" height="8.6" rx="1.8" fill="currentColor"/><rect x="24" y="4.3" width="1.6" height="4.4" rx=".8" fill="currentColor" opacity=".5"/></svg>
      </span>
    </div>
    <div class="body" id="view"></div>
    <div class="obfoot" id="obfoot" style="display:none"></div>
    <div class="toast" id="toast"></div>
    <div class="tabbar" id="tabbar"></div>
  </div>
</div>

<script>
/* ============================ 페르소나 ============================ */
const PERSONAS = {
  mom:    {face:"🤱", name:"걱정 많은 엄마", desc:"잔소리 풀파워, 다 너 잘되라고",
           greet:n=>`${n}아, 일어났니? 오늘 챙길 거 많던데 엄마가 다 적어놨어.`,
           remind:i=>`${i} 챙겼어? 엄마가 몇 번을 말해. 빠뜨리고 또 전화하지 말고!`,
           weather:w=>`밖에 ${w}래. 감기 걸리면 너만 고생이야, 꼭 챙겨!`,
           praise:()=>`그래 그래, 이제 좀 사람 됐네. 잘했어 우리 애기.`},
  teacher:{face:"👨‍🏫", name:"초등학교 담임쌤", desc:"준비물 검사, 깐깐하지만 다정",
           greet:n=>`${n} 학생, 오늘 준비물 점검 시작합니다. 자, 가방 열어보세요~`,
           remind:i=>`${i}, 가방에 넣었나요? 안 가져오면 옆 친구한테 빌려야 해요!`,
           weather:w=>`오늘 ${w}니까 선생님이 미리 알려줘요. 준비성 있는 어린이가 됩시다.`,
           praise:()=>`참 잘했어요! 오늘 준비물 100점, 칭찬 도장 꾹.`},
  tsun:   {face:"😤", name:"츤데레 친구", desc:"챙겨주면서 절대 안 챙기는 척",
           greet:n=>`야 ${n}. 딱히 너 걱정한 건 아닌데... 챙길 거 정리해놨다. 고마워하진 마.`,
           remind:i=>`${i} 안 챙겼지? 하... 내가 이럴 줄 알았어. 빨리 넣어 빨리.`,
           weather:w=>`${w}라던데. 별 상관은 없지만 너 감기 걸리면 시끄러우니까 챙겨.`,
           praise:()=>`오 다 챙겼네? 뭐... 이 정도면 봐줄 만하다.`},
  robot:  {face:"🤖", name:"집사 로봇 J-5", desc:"논리적이고 정확한 브리핑",
           greet:n=>`${n}님, 좋은 아침입니다. 오늘의 외출 준비 프로토콜을 실행합니다.`,
           remind:i=>`알림: '${i}' 미체크. 누락 시 외출 실패 확률 상승. 조치 권장.`,
           weather:w=>`환경 데이터 분석 결과: ${w}. 대응 품목을 리스트에 반영했습니다.`,
           praise:()=>`체크리스트 100% 완료. 효율적인 외출이 예상됩니다. 훌륭합니다.`},
  sergeant:{face:"🪖", name:"훈련소 조교", desc:"빠릿빠릿, 군기 충전",
           greet:n=>`${n} 훈련병! 기상! 오늘 챙길 군장 점검 실시한다. 실시!`,
           remind:i=>`${i} 안 챙겼나! 빠졌으면 다시! 빠릿빠릿 안 움직여?!`,
           weather:w=>`기상 상황 ${w}! 대비 품목 지급 완료! 빠뜨리면 얼차려다!`,
           praise:()=>`좋아! 군장 점검 통과! 역시 우리 훈련병, 자세 나온다!`},

// 실시간 날씨 (open-meteo, 키 불필요 · localhost에서 위치 권한 동작)
async function fetchWeather(){
  if(!navigator.geolocation) return;
  try{
    const pos=await new Promise((ok,no)=>navigator.geolocation.getCurrentPosition(ok,no,{timeout:9000,maximumAge:600000}));
    const {latitude:la,longitude:lo}=pos.coords;
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${la}&longitude=${lo}&current=temperature_2m&hourly=precipitation_probability&forecast_days=1&timezone=auto`);
    const d=await r.json();
    const t=Math.round(d.current.temperature_2m);
    const probs=(d.hourly?.precipitation_probability||[]).slice(0,18);
    const rp=probs.length?Math.max(...probs):0;
    WEATHER.temp=t+"°"; WEATHER.rainProb=rp; WEATHER.live=true;
    WEATHER.sky = rp>=60?"흐림 · 비 가능성 높음":rp>=30?"구름 조금":"대체로 맑음";
    WEATHER.envItems=[];
    if(rp>=50) WEATHER.envItems.push({name:"우산", why:`강수확률 ${rp}%`});
    if(t<=15)  WEATHER.envItems.push({name:"겉옷", why:`기온 ${t}°, 쌀쌀`});
    if(t>=28)  WEATHER.envItems.push({name:"선크림", why:`기온 ${t}°, 자외선 주의`});
    if(S.onboarded && S.tab==="home") render();
  }catch(e){ /* 권한 거부/실패 시 모의값 유지 */ }
}

/* 일정 텍스트 분석 → 추천 (프로필 개인화 + 목적 반영) */
function analyze(text, purposeCat){
  const low=text.toLowerCase();
  let cat = purposeCat || "기타", items=new Set(BASE);
  for(const r of RULES){
    if((purposeCat && r.cat===purposeCat) || r.kw.some(k=>low.includes(k.toLowerCase()))){
      if(!purposeCat) cat=r.cat; r.items.forEach(i=>items.add(i));
    }
  }
  // 프로필: 항상 챙기는 품목(렌즈/약)
  LIFESTYLE.filter(l=>S.profile.lifestyle.includes(l.id) && l.always).forEach(l=>l.items.forEach(i=>items.add(i)));
  // 반려동물 + 산책/공원 일정
  if(S.profile.lifestyle.includes("pet") && /산책|공원|강아지|반려/.test(low)) (LIFESTYLE.find(l=>l.id==="pet").walk||[]).forEach(i=>items.add(i));
  if(WEATHER.rainProb>=60) items.add("우산");
  return {cat, items:[...items]};
}

/* 스와이프 제스처 + 애니메이션 */
function attachSwipe(){
  const TH=88; // 발동 임계치
  document.querySelectorAll('.swipe-card').forEach(card=>{
    const wrap=card.parentElement, done=card.dataset.done==='1';
    let startX=0, dx=0, drag=false;
    const move=e=>{
      if(!drag)return;
      dx=(e.clientX??e.touches?.[0]?.clientX)-startX;
      dx = done ? Math.min(0,Math.max(dx,-150)) : Math.max(0,Math.min(dx,150));
      card.style.transform=`translateX(${dx}px)`;
      wrap.classList.toggle('armed', Math.abs(dx)>TH);
    };
    const end=()=>{
      if(!drag)return; drag=false;
      window.removeEventListener('pointermove',move);
      window.removeEventListener('pointerup',end);
      card.style.transition='transform .25s cubic-bezier(.2,.8,.2,1)';
      if(Math.abs(dx)>TH){
        card.style.transform=`translateX(${done?-380:380}px)`;
        card.style.opacity='.4';
        setTimeout(()=>commitSwipe(card), 190);
      } else {
        card.style.transform='translateX(0)';
        wrap.classList.remove('armed');
      }
    };
    card.addEventListener('pointerdown',e=>{
      drag=true; startX=e.clientX; dx=0; card.style.transition='none';
      window.addEventListener('pointermove',move);
      window.addEventListener('pointerup',end);
    });
  });
}
function commitSwipe(card){
  if(card.dataset.kind==='item') toggleItem(card.dataset.plan, +card.dataset.idx);
  else toggleEnv(+card.dataset.idx);
}

// 일정 입력 → AI 추천 (모호하면 한 번 되묻고, 정해지면 추천 / 실패 시 규칙 엔진)
async function doRecommend(){
  const d=S.chat.draft;
  botSay("🤖 AI가 일정을 읽고 분석하고 있어요...");
  S.chat.stage="thinking"; save(); renderAdd();
  const text=[d.schedule,d.place,d.purpose,...(d.notes||[])].filter(Boolean).join(" ");
  const ruleR=analyze(text, d.purpose||undefined);
  let resp=null;
  try{ resp=await aiRecommend(d); }catch(e){ resp={error:(e&&e.message)||"AI_FAIL"}; }
  S.chat.msgs.pop(); // "분석 중" 제거

  // AI가 추가 질문을 요청 (모호한 일정) → 한 가지만 되묻기 (최대 2회)
  if(resp && resp.ask && (d.round||0) < 2){
    d.round=(d.round||0)+1;
    S.chat.clarify={question:resp.ask, options:resp.options||[]};
    botSay("❓ "+resp.ask);
    S.chat.stage="clarify"; save(); renderAdd(); return;
  }

  // 추천 확정 (AI 결과 우선, 없으면 규칙 엔진 폴백)
  let items, src;
  if(resp && resp.items && resp.items.length){ items=resp.items; src="🤖 AI 분석 (FactChat · GPT-5)"; }
  else { items=ruleR.items; src="규칙 엔진"+(resp&&resp.error==="NO_KEY"?"":" · AI 연결 실패"); }
  S.chat.clarify=null;
  d.cat = d.purpose || ruleR.cat;
  d.items = items.map(n=>({n,added:true}));
  const warn=d.items.filter(i=>isForget(i.n)).length;
  botSay(`${src}로 추천했어요!<br/>'<b>${d.schedule}</b>'${d.place?` @${d.place}`:""}에 꼭 필요한 준비물 <b>${d.items.length}개</b>만 골랐어요${warn?` · ⚠️ 자주 깜빡 ${warn}개 포함`:""}.<br/>담을 것만 탭하세요. 더 정확히 하려면 📍장소·🎯목적을 더해요.`);
  S.chat.stage="recommend"; save(); renderAdd();
}
async function aiRecommend(d){
  const res=await fetch("/api/recommend",{
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({schedule:d.schedule, place:d.place, purpose:d.purpose,
      notes:d.notes||[], round:d.round||0, profile:S.profile, weather:WEATHER})
  });
  const data=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error||"AI_FAIL");
  return data; // {items:[...]} 또는 {ask, options:[...]}
}
function answerClarifyIdx(i){ const o=(S.chat.clarify?.options)||[]; answerClarify(o[i]); }
function answerClarifyInput(){ const v=($("#chatIn")?.value||"").trim();

function answerClarify(ans){
  if(!ans) return;
  const q=(S.chat.clarify&&S.chat.clarify.question)||"";
  S.chat.draft.notes=S.chat.draft.notes||[];
  S.chat.draft.notes.push(`${q} → ${ans}`);

}

function finishChat(){
  const d=S.chat.draft;
  const chosen=d.items.filter(i=>i.added);
  if(!chosen.length){toast("담을 준비물을 한 개 이상 골라주세요!");return;}
  const title=d.schedule+(d.place?` @${d.place}`:"");
  S.plans.push({id:Date.now(), title, cat:d.cat, items:chosen.map(i=>({n:i.n,done:false}))});
  // 반복 일정 학습
  S.learn[d.cat]=(S.learn[d.cat]||0)+1;
  pushNoti(persona().remind(chosen[0].n));
  if(d.cat!=="기타" && S.learn[d.cat]>=2 && !S.learnedCats.includes(d.cat)){
    S.pendingLearn={cat:d.cat, count:S.learn[d.cat], items:[...new Set(chosen.map(i=>i.n))]};
  }
  meSay(`${chosen.length}개 담기 완료!`);
  botSay(`'<b>${title}</b>' 일정과 준비물을 저장했어요! ✅${S.pendingLearn?"<br/>🧠 같은 일정을 반복하셔서 <b>루틴 등록</b>을 제안드려요. 홈에서 확인하세요!":""}`);
  S.chat.stage="done"; save();
  toast(S.pendingLearn?"저장 완료! 반복 일정으로 학습했어요 🧠":"일정과 준비물을 저장했어요!");
  renderAdd();
}

  let ai="⚠️ 로컬 서버 미실행 — 규칙 엔진으로 동작<br/><span style='font-size:11px'>터미널에서 <code>node server.js</code> 후 localhost로 접속하세요</span>";
  try{
    const r=await fetch("/api/health"); const d=await r.json();
    ai = d.ai ? "✅ 실제 AI 추천 연결됨 (FactChat · "+d.model+")" : "⚠️ 서버 실행 중 · API 키 없음 → 규칙 엔진 폴백";
  }catch(e){}
  el.innerHTML = "🤖 AI 추천: "+ai+"<br/>🌧 날씨: "+wx;
}
function changePersona(k){S.persona=k;seedNotis();save();toast(`'${PERSONAS[k].name}'(으)로 변경! 잔소리 톤이 바뀌어요.`);render();}
function redoOnboard(){S.onboarded=false;S.obStep=1;S.profile={lifestyle:[],forget:[],level:null};S.routines=[];S.plans=[];S.learn={};S.learnedCats=[];S.chat=null;S.pendingLearn=null;save();render();}
function resetAll(){if(confirm("모든 데이터를 초기화할까요?")){localStorage.removeItem(KEY);location.reload();}}

/* ============================ 시계 ============================ */
function tick(){const d=new Date();$("#clock").textContent=`${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;}
tick();setInterval(tick,10000);
render();
if(S.onboarded) fetchWeather();
// PWA: 서비스워커 등록 (설치형 앱 + 오프라인)
if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
